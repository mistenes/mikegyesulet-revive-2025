services:
  - type: web
    name: mik-app
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: mik-postgres
          property: connectionString
      - key: MAPBOX_TOKEN
        value: ""
      - key: ADMIN_EMAIL
        value: admin@mik.hu
      - key: ADMIN_PASSWORD
        value: ""
      - key: ADMIN_JWT_SECRET
        value: ""
      - key: IMAGEKIT_PUBLIC_KEY
        value: ""
      - key: IMAGEKIT_PRIVATE_KEY
        value: ""
      - key: IMAGEKIT_URL_ENDPOINT
        value: ""
      - key: IMAGEKIT_GALLERY_FOLDER
        value: ""
      - key: VITE_BUNNY_STORAGE_ZONE
        value: "YOUR_STORAGE_ZONE_NAME"
      - key: VITE_BUNNY_STORAGE_KEY
        value: "YOUR_BUNNY_STORAGE_API_KEY"
      - key: VITE_BUNNY_CDN_HOSTNAME
        value: "YOUR_CDN_HOSTNAME_OR_PULL_ZONE (e.g. mikegyesulet.b-cdn.net)"
      - key: VITE_BUNNY_STORAGE_HOST
        value: "storage.bunnycdn.com"
      - key: OPENAI_API_KEY
        value: ""
      - key: BREVO_API_KEY
        value: ""
      - key: BREVO_FROM_EMAIL
        value: ""
      - key: BREVO_FROM_NAME
        value: "MIK Admin"
    autoDeploy: true

databases:
  - name: mik-postgres
    plan: free
